<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>Bubble Sort Visualization</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        #barsContainer {
            display: flex;
            align-items: flex-end;
            height: 300px;
            margin-top: 20px;
            border: 1px solid #ccc;
            padding: 10px;
        }
        .bar {
            margin: 0 2px;
            background-color: steelblue;
            width: 20px;
            text-align: center;
            color: white;
        }
        .bar.comparing {
            background-color: orange;
        }
        .bar.swapped {
            background-color: crimson;
        }
    </style>
</head>
<body>
    <h1>Bubble Sort Visualization</h1>
    <p>可以手动输入整数（用空格分隔），或指定数量生成随机数组，点击“开始”查看动画。</p>
    <label for="countInput">元素数量:</label>
    <input type="number" id="countInput" min="1" value="10" style="width:60px;">
    <button id="generateBtn">生成随机数组</button><br><br>
    <textarea id="arrayInput" rows="3" cols="40" placeholder="例如: 5 2 9 1 5"></textarea><br>
    <button id="startBtn">开始</button>
    <div id="barsContainer"></div>
    
    <p><a href="index.html">返回首頁</a></p>

    <script src="bubble.js"></script>
</body>
</html>
